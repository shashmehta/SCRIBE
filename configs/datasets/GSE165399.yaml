id: GSE165399
title: "Normal Pancreas, IPMN, and Adenosquamous Carcinoma"
description: >
  Three pancreatic conditions profiled by scRNA-seq: normal pancreas, intraductal
  papillary mucinous neoplasm (IPMN), and pancreatic adenosquamous carcinoma (PASC).
  Raw data is a TAR archive of per-sample tab-separated DGE text files (genes × cells).

source:
  type: local
  base_path: "/Users/shash/Library/CloudStorage/GoogleDrive-shashvatsmehta@gmail.com/.shortcut-targets-by-id/1m6XoSPhIWcxsfR8TAwcwAbQMXWcFQw6l/ShashvatHighSchoolCollege/2025ResearchExternship/Datasets"

# TAR contains per-sample TXT DGE matrices named by GSM accession.
# Loader extracts the TAR, reads each TXT file, and concatenates into one AnnData.
files:
  - format: tar_txt_dge
    relative_path: "GSE165399/GSE165399_RAW.tar"

preprocessing:
  min_genes: 200
  min_cells: 3
  mt_pct_threshold: 20.0
  n_top_genes: 2000
  n_pcs: 30
  leiden_resolution: 0.5

cellxgene:
  assay_ontology_term_id: "EFO:0009922"      # 10x 3' v2
  disease_ontology_term_id: "unknown"        # varies per sample; set per-cell via samples list
  tissue_ontology_term_id: "UBERON:0001264"  # pancreas
  organism_ontology_term_id: "NCBITaxon:9606"

# Each sample is identified by its GSM accession (prefix of the TXT filename).
# TODO: verify GSM accession numbers against https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE165399
# and update gsm_id values accordingly before running convert.
samples:
  - id: "normal"
    condition: "normal"
    gsm_id: "GSM5032701"           # TODO: confirm on GEO
    tissue_ontology_term_id: "UBERON:0001264"   # pancreas
    disease_ontology_term_id: "PATO:0000461"    # normal

  - id: "IPMN"
    condition: "IPMN"
    gsm_id: "GSM5032702"           # TODO: confirm on GEO
    tissue_ontology_term_id: "UBERON:0001264"   # pancreas
    disease_ontology_term_id: "MONDO:0005052"   # intraductal papillary mucinous neoplasm

  - id: "PASC"
    condition: "PASC"
    gsm_id: "GSM5032703"           # TODO: confirm on GEO
    tissue_ontology_term_id: "UBERON:0001264"   # pancreas
    disease_ontology_term_id: "MONDO:0003450"   # adenosquamous carcinoma
