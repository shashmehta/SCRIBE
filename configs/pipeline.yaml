# Pipeline configuration for the train / evaluate / plot subcommands.
# All values here are defaults; individual CLI flags override them.

# Path to the processed .h5ad file produced by `convert`.
# Update this to point at the dataset you want to classify.
data: "./output/GSE154778_processed.h5ad"

# Directory where model artifacts, plots, and results are written.
output: "./output"

# Name of the obs column that holds condition labels (e.g. "primary", "metastatic").
condition_col: "CONDITION"

model:
  n_estimators: 100
  class_weight: "balanced"   # handles class imbalance between conditions
  random_state: 42
  test_size: 0.2             # fraction of cells held out for evaluation

analysis:
  top_n_genes: 20            # number of top feature-importance genes to report

plots:
  # obs columns to use for UMAP coloring. Only columns present in the data are plotted.
  umap_columns:
    - "celltype3"
    - "Cell_type"
    - "CONDITION"
  # Specific genes to overlay on UMAP. Empty list = top 2 from feature importances.
  umap_genes: []
